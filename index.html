<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게임 진행 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;800&family=SUIT:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-initial-mode="play">
    <div class="background-shape shape-one"></div>
    <div class="background-shape shape-two"></div>

    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">WORKSHOP GAME</p>
          <h1>게임 진행 보드</h1>
          <p class="hero-copy">
            몸으로 말해요와 10초 그림 그리기를 게임 탭으로 나눠 진행할 수 있어요.
          </p>
        </div>

        <nav class="mode-switch page-links" aria-label="페이지 이동">
          <a class="mode-button active" href="./play.html">사용 페이지</a>
          <a class="mode-button" href="./admin.html">관리자 페이지</a>
        </nav>
      </header>

      <section class="panel play-panel active" data-mode-panel="play">
        <div class="panel-header">
          <div>
            <p class="section-label">PLAY MODE</p>
            <h2>게임과 단계를 선택해 진행하세요</h2>
          </div>
          <div class="play-header-actions">
            <button
              class="icon-button"
              id="presentation-toggle-button"
              type="button"
              aria-label="발표 화면 최대화"
              title="발표 화면 최대화"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                />
              </svg>
            </button>
            <button class="secondary-button" id="shuffle-current-button" type="button">
              현재 안 다시 섞기
            </button>
          </div>
        </div>

        <div class="connection-bar">
          <div class="status-pill">저장 방식 <strong id="storage-mode-label">확인 중</strong></div>
          <div class="status-pill">연결 상태 <strong id="connection-status-label">확인 중</strong></div>
        </div>

        <section class="stage-panel">
          <div class="game-tabs" id="play-game-tabs"></div>
          <div class="stage-tabs" id="play-stage-tabs"></div>
        </section>

        <section class="timer-panel">
          <div class="timer-display-wrap">
            <p class="section-label">GAME TIMER</p>
            <div class="timer-display" id="timer-display">01:00</div>
            <p class="timer-meta">기본 시간 <strong id="timer-default-label">60초</strong></p>
          </div>

          <div class="timer-controls">
            <button class="primary-button" id="timer-start-button" type="button">타이머 시작</button>
            <button class="secondary-button" id="timer-pause-button" type="button">일시정지</button>
            <button class="ghost-button" id="timer-reset-button" type="button">시간 리셋</button>
          </div>
        </section>

        <div class="topic-grid" id="topic-grid"></div>

        <section class="option-panel" id="option-panel">
          <div class="option-panel-copy">
            <p class="section-label">PROMPT SET</p>
            <h3>사용할 안을 선택하세요</h3>
          </div>
          <div class="option-buttons" id="option-buttons"></div>
        </section>

        <section class="card-area">
          <div class="status-row">
            <div class="status-pill">현재 게임 <strong id="current-game-name">없음</strong></div>
            <div class="status-pill">선택한 단계 <strong id="current-stage-name">없음</strong></div>
            <div class="status-pill">선택한 주제 <strong id="current-topic-name">없음</strong></div>
            <div class="status-pill">선택한 안 <strong id="current-option-name">없음</strong></div>
            <div class="status-pill">맞춘 개수 <strong id="solved-count">0</strong></div>
            <div class="status-pill">남은 제시어 <strong id="remaining-count">0</strong></div>
          </div>

          <article class="prompt-card" id="prompt-card">
            <p class="prompt-card-label">랜덤 제시어</p>
            <h3 id="prompt-text">먼저 게임을 선택해 주세요</h3>
          </article>

          <div class="card-actions">
            <button class="primary-button" id="next-prompt-button" type="button">다음 제시어 보기</button>
            <button class="ghost-button" id="reset-topic-button" type="button">현재 안 처음부터</button>
            <button class="secondary-button" id="restart-flow-button" type="button">다시 시작</button>
          </div>
        </section>
      </section>
    </main>

    <button
      class="presentation-exit-button"
      id="presentation-exit-button"
      type="button"
      aria-label="발표 화면 종료"
      title="발표 화면 종료"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M9 4H4v5M20 9V4h-5M15 20h5v-5M4 15v5h5"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
        />
      </svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
